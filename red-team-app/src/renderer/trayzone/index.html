<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      cursor: pointer;
    }
    #zone {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="zone"></div>
  <script>
    document.getElementById('zone').addEventListener('click', () => {
      window.electronAPI.send('trayzone:clicked');
    });
  </script>
</body>
</html>
