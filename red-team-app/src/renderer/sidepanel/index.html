<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; font-src 'self' data: https://cdn.jsdelivr.net https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https:;">
  <title>Hinty — Session</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <style>
    @import url('https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/style.css');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    *:focus, *:focus-visible { outline: none; }

    /* ── Theme Variables ── */
    :root, [data-theme="dark"] {
      --bg: #050506;
      --bg-surface: rgba(14, 14, 16, 0.92);
      --bg-elevated: #111116;
      --bg-hover: rgba(255,255,255,0.04);
      --bg-active: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.06);
      --border-strong: rgba(255,255,255,0.10);
      --border-shell: rgba(255,255,255,0.08);
      --text-primary: rgba(255,255,255,0.90);
      --text-secondary: rgba(255,255,255,0.55);
      --text-tertiary: rgba(255,255,255,0.30);
      --text-quaternary: rgba(255,255,255,0.15);
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --primary-soft: rgba(59,130,246,0.12);
      --primary-border: rgba(59,130,246,0.25);
      --primary-text: rgba(59,130,246,0.90);
      --danger: rgba(220,80,80,0.70);
      --danger-soft: rgba(220,80,80,0.10);
      --success: rgba(52,211,153,0.70);
      --success-soft: rgba(52,211,153,0.12);
      --scrollbar: rgba(255,255,255,0.06);
      --code-bg: rgba(255,255,255,0.03);
      --code-border: rgba(255,255,255,0.06);
      --input-bg: rgba(255,255,255,0.03);
      --input-border: rgba(255,255,255,0.08);
      --shell-bg: var(--bg-surface);
      --shell-shadow: none;
      --btn-primary-bg: var(--primary);
      --btn-primary-text: #ffffff;
      --send-btn-bg: var(--primary);
      --send-btn-text: #ffffff;
      --user-bubble-bg: var(--primary);
      --user-bubble-text: #ffffff;
      --assist-bg: linear-gradient(135deg, rgba(59,130,246,0.18) 0%, rgba(59,130,246,0.06) 100%);
      --assist-border: rgba(59,130,246,0.30);
      --assist-color: rgba(59,130,246,0.95);
      --assist-hover-bg: linear-gradient(135deg, rgba(59,130,246,0.25) 0%, rgba(59,130,246,0.10) 100%);
      --assist-hover-border: rgba(59,130,246,0.40);
      --dropdown-bg: rgba(24,24,28,0.96);
      --float-bg: rgba(18,18,22,0.88);
      --float-border: rgba(255,255,255,0.08);
      --timer-active: #f59e0b;
      --silver-border: rgba(180,185,210,0.18);
      --silver-glow: rgba(180,185,210,0.08);
    }

    [data-theme="light"] {
      --bg: #f8f9fa;
      --bg-surface: rgba(255, 255, 255, 0.94);
      --bg-elevated: #ffffff;
      --bg-hover: rgba(0,0,0,0.03);
      --bg-active: rgba(0,0,0,0.05);
      --border: rgba(0,0,0,0.06);
      --border-strong: rgba(0,0,0,0.12);
      --border-shell: rgba(0,0,0,0.10);
      --text-primary: rgba(0,0,0,0.88);
      --text-secondary: rgba(0,0,0,0.65);
      --text-tertiary: rgba(0,0,0,0.50);
      --text-quaternary: rgba(0,0,0,0.25);
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --primary-soft: rgba(37,99,235,0.08);
      --primary-border: rgba(37,99,235,0.22);
      --primary-text: #2563eb;
      --danger: rgba(220,60,60,0.80);
      --danger-soft: rgba(220,60,60,0.06);
      --success: rgba(22,163,74,0.80);
      --success-soft: rgba(22,163,74,0.08);
      --scrollbar: rgba(0,0,0,0.08);
      --code-bg: rgba(0,0,0,0.03);
      --code-border: rgba(0,0,0,0.08);
      --input-bg: rgba(0,0,0,0.02);
      --input-border: rgba(0,0,0,0.10);
      --shell-bg: var(--bg-surface);
      --shell-shadow: none;
      --btn-primary-bg: var(--primary);
      --btn-primary-text: #ffffff;
      --send-btn-bg: var(--primary);
      --send-btn-text: #ffffff;
      --user-bubble-bg: var(--primary);
      --user-bubble-text: #ffffff;
      --assist-bg: linear-gradient(135deg, rgba(37,99,235,0.12) 0%, rgba(37,99,235,0.04) 100%);
      --assist-border: rgba(37,99,235,0.22);
      --assist-color: #2563eb;
      --assist-hover-bg: linear-gradient(135deg, rgba(37,99,235,0.18) 0%, rgba(37,99,235,0.08) 100%);
      --assist-hover-border: rgba(37,99,235,0.32);
      --dropdown-bg: rgba(255,255,255,0.96);
      --float-bg: rgba(255,255,255,0.90);
      --float-border: rgba(0,0,0,0.08);
      --timer-active: #d97706;
      --silver-border: rgba(120,120,140,0.22);
      --silver-glow: rgba(120,120,140,0.10);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: 'Geist Sans', 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
      user-select: none;
      color: var(--text-primary);
      letter-spacing: -0.011em;
    }

    /* ── Outer layout ── */
    #outer-wrap {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 6px;
      pointer-events: none;
    }

    /* ── Floating bar (above shell) ── */
    #float-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2px 6px;
      flex-shrink: 0;
      pointer-events: auto;
      position: relative;
      z-index: 10;
    }

    .float-pill {
      display: flex;
      align-items: center;
      gap: 3px;
      padding: 4px 6px;
      border-radius: 50px;
      background: var(--float-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 0.5px solid var(--float-border);
    }

    .float-ctrl {
      width: 24px; height: 24px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--text-tertiary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .float-ctrl:hover { color: var(--text-secondary); background: var(--bg-active); }
    .float-ctrl.close-btn:hover { color: var(--danger); background: var(--danger-soft); }
    .float-ctrl.drag-handle { cursor: grab; }
    .float-ctrl.drag-handle:active { cursor: grabbing; }

    /* ── Timer in floating bar ── */
    #float-timer {
      position: relative;
    }
    .ft-btn {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--text-tertiary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .ft-btn:hover { color: var(--text-secondary); background: var(--bg-active); }

    .ft-time {
      font-size: 11px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      padding: 0 4px;
      letter-spacing: 0.02em;
    }
    .ft-time.focus { color: var(--timer-active); }
    .ft-time.break { color: var(--success); }
    .ft-time.paused { color: var(--text-tertiary); }

    /* Timer active group: slides open when timer is running */
    .ft-active-group {
      display: flex;
      align-items: center;
      gap: 3px;
      max-width: 0;
      opacity: 0;
      overflow: hidden;
      transition: max-width 0.35s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.25s ease;
    }
    .ft-active-group.show {
      max-width: 130px;
      opacity: 1;
    }
    /* Hide clock icon when timer is active */
    #sp-timer-toggle {
      max-width: 22px;
      opacity: 1;
      overflow: hidden;
      transition: max-width 0.3s ease, opacity 0.2s ease;
    }
    #float-timer.timer-active #sp-timer-toggle {
      max-width: 0;
      opacity: 0;
    }

    /* Timer dropdown */
    .ft-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      width: 190px;
      background: var(--dropdown-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border-strong);
      border-radius: 14px;
      padding: 10px;
      z-index: 200;
      display: none;
    }
    .ft-dropdown.open { display: block; }

    .ft-presets {
      display: flex;
      gap: 4px;
      margin-bottom: 8px;
    }
    .ft-preset {
      flex: 1;
      padding: 5px 0;
      border-radius: 50px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-tertiary);
      font-family: inherit;
      font-size: 10px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s ease;
    }
    .ft-preset:hover { border-color: var(--border-strong); color: var(--text-secondary); }
    .ft-preset.active { border-color: var(--primary-border); color: var(--primary-text); background: var(--primary-soft); }

    .ft-start-btn {
      width: 100%;
      padding: 6px;
      border-radius: 50px;
      border: 1px solid var(--primary-border);
      background: linear-gradient(135deg, rgba(59,130,246,0.12) 0%, rgba(59,130,246,0.03) 100%);
      color: var(--primary-text);
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .ft-start-btn:hover {
      border-color: rgba(59,130,246,0.40);
      background: linear-gradient(135deg, rgba(59,130,246,0.18) 0%, rgba(59,130,246,0.06) 100%);
    }

    /* Invisibility eye button active state */
    .float-ctrl.invis-active {
      color: var(--primary-text);
      background: var(--primary-soft);
    }

    /* Meeting button active state */
    .float-ctrl.meeting-active {
      color: #ef4444;
      background: rgba(239,68,68,0.12);
    }
    .float-ctrl.meeting-active:hover {
      color: #ef4444;
      background: rgba(239,68,68,0.18);
    }

    /* ── Main shell ── */
    #shell {
      display: flex;
      flex-direction: column;
      border-radius: 14px;
      overflow: hidden;
      position: relative;
      background: var(--shell-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 0.5px solid var(--border-shell);
      box-shadow: var(--shell-shadow);
      max-height: calc(100% - 44px);
      flex-shrink: 1;
      min-height: 0;
      pointer-events: auto;
    }

    /* ── Chat ── */
    #chat-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px;
      scrollbar-width: thin;
      scrollbar-color: var(--scrollbar) transparent;
      min-height: 0;
      transition: max-height 0.5s cubic-bezier(0.22, 1, 0.36, 1),
                  opacity 0.35s ease,
                  padding 0.4s ease;
      max-height: 600px;
      opacity: 1;
    }
    #chat-scroll::-webkit-scrollbar { width: 3px; }
    #chat-scroll::-webkit-scrollbar-track { background: transparent; }
    #chat-scroll::-webkit-scrollbar-thumb { background: var(--input-border); border-radius: 2px; }

    #chat-messages {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    #chat-messages:empty::before {
      content: attr(data-empty-hint);
      color: var(--text-quaternary);
      font-size: 13px;
      line-height: 1.6;
      padding: 60px 20px;
      text-align: center;
    }

    /* ── Compact mode ── */
    #shell.compact #chat-scroll {
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      padding-top: 0;
      padding-bottom: 0;
    }
    #shell.compact {
      box-shadow: none;
      border-color: var(--border);
    }

    /* Disable transitions on first load to prevent flash */
    .no-transition,
    .no-transition *,
    .no-transition #chat-scroll {
      transition: none !important;
    }

    /* ── Messages ── */
    .msg { display: flex; flex-direction: column; gap: 4px; }

    .msg.user { align-items: flex-end; }

    .msg.user .msg-body {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 12px;
      background: var(--user-bubble-bg);
      color: var(--user-bubble-text);
      font-size: 13px;
      line-height: 1.5;
      max-width: 85%;
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    .msg-meta {
      font-size: 11px;
      color: var(--text-quaternary);
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      transition: color 0.15s ease;
    }
    .msg-meta:hover { color: var(--text-secondary); }
    .msg-meta svg { flex-shrink: 0; }

    .msg.ai { align-items: flex-start; }

    .msg.ai .msg-body {
      font-size: 13px;
      line-height: 1.65;
      color: var(--text-primary);
      word-wrap: break-word;
      padding: 0 2px;
      max-width: 95%;
    }

    /* ── Markdown in AI messages ── */
    .msg.ai .msg-body p { margin: 0 0 8px; }
    .msg.ai .msg-body p:last-child { margin-bottom: 0; }
    .msg.ai .msg-body h1, .msg.ai .msg-body h2, .msg.ai .msg-body h3 {
      font-size: 14px; font-weight: 600; color: var(--text-primary); margin: 14px 0 6px;
    }
    .msg.ai .msg-body h1:first-child, .msg.ai .msg-body h2:first-child, .msg.ai .msg-body h3:first-child { margin-top: 0; }
    .msg.ai .msg-body ul, .msg.ai .msg-body ol { margin: 6px 0; padding-left: 20px; }
    .msg.ai .msg-body li { margin-bottom: 3px; }
    .msg.ai .msg-body li:last-child { margin-bottom: 0; }
    .msg.ai .msg-body code {
      font-family: 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 12px; background: var(--code-bg); border: 0.5px solid var(--code-border);
      border-radius: 4px; padding: 1px 5px;
    }
    .msg.ai .msg-body .code-block-wrap { position: relative; margin: 8px 0; }
    .msg.ai .msg-body .code-block-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 12px; border-radius: 8px 8px 0 0;
      background: var(--bg-active); border: 0.5px solid var(--code-border); border-bottom: none;
    }
    .msg.ai .msg-body .code-lang {
      font-size: 10px; font-weight: 500; color: var(--text-tertiary);
      text-transform: uppercase; letter-spacing: 0.5px;
      font-family: 'SF Mono', 'JetBrains Mono', monospace;
    }
    .msg.ai .msg-body .copy-btn {
      padding: 2px 8px; border-radius: 4px; border: none; background: var(--bg-active);
      color: var(--text-tertiary); font-family: inherit; font-size: 10px; font-weight: 500;
      cursor: pointer; transition: all 0.15s ease; user-select: none;
    }
    .msg.ai .msg-body .copy-btn:hover { background: var(--border-strong); color: var(--text-secondary); }
    .msg.ai .msg-body .copy-btn.copied { color: var(--success); }
    .msg.ai .msg-body pre {
      margin: 0; border-radius: 0 0 8px 8px; background: var(--code-bg);
      border: 0.5px solid var(--code-border); border-top: none; padding: 12px 14px;
      overflow-x: auto; scrollbar-width: thin; scrollbar-color: var(--scrollbar) transparent;
    }
    .msg.ai .msg-body .code-block-wrap + p, .msg.ai .msg-body p + .code-block-wrap { margin-top: 8px; }
    .msg.ai .msg-body > pre { border-radius: 8px; border: 0.5px solid var(--code-border); margin: 8px 0; }
    .msg.ai .msg-body pre code {
      background: none; border: none; padding: 0; font-size: 12px; line-height: 1.5; color: var(--text-secondary);
    }
    .katex-display { margin: 10px 0; overflow-x: auto; }
    .katex { font-size: 1em; }
    .msg.ai .msg-body blockquote { border-left: 2px solid var(--border-strong); padding-left: 12px; margin: 8px 0; color: var(--text-secondary); }
    .msg.ai .msg-body strong { font-weight: 600; color: var(--text-primary); }
    .msg.ai .msg-body hr { border: none; border-top: 0.5px solid var(--input-border); margin: 12px 0; }
    .msg.ai .msg-body table { border-collapse: collapse; margin: 8px 0; font-size: 12px; width: 100%; }
    .msg.ai .msg-body th, .msg.ai .msg-body td { border: 0.5px solid var(--input-border); padding: 6px 10px; text-align: left; }
    .msg.ai .msg-body th { background: var(--bg-hover); font-weight: 600; color: var(--text-secondary); }

    /* ── Screenshot modal ── */
    #ss-modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.80); backdrop-filter: blur(8px);
      z-index: 200; align-items: center; justify-content: center; cursor: pointer;
      pointer-events: auto;
    }
    #ss-modal.visible { display: flex; }
    #ss-modal img { max-width: 90%; max-height: 85%; border-radius: 10px; }

    /* ── Upgrade modal (tier-gate + daily quota) ── */
    .upgrade-modal {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 220;
      align-items: center;
      justify-content: center;
      padding: 20px;
      pointer-events: auto;
      animation: upgrade-fade 0.15s ease-out;
    }
    .upgrade-modal.visible { display: flex; }
    @keyframes upgrade-fade {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .upgrade-card {
      width: 100%;
      max-width: 320px;
      background: var(--bg-primary, #1b1b1e);
      border: 1px solid var(--silver-border);
      border-radius: 14px;
      padding: 18px 18px 16px 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.04) inset;
      animation: upgrade-pop 0.18s cubic-bezier(0.2, 0.9, 0.3, 1.2);
    }
    @keyframes upgrade-pop {
      from { transform: scale(0.94); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .upgrade-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }
    .upgrade-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.35;
    }
    .upgrade-close {
      width: 22px; height: 22px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: var(--text-quaternary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .upgrade-close:hover { color: var(--text-primary); background: rgba(255,255,255,0.06); }
    .upgrade-body {
      font-size: 12.5px;
      line-height: 1.55;
      color: var(--text-secondary);
      margin-bottom: 16px;
    }
    .upgrade-body ul {
      margin: 8px 0 0 0;
      padding-left: 16px;
    }
    .upgrade-body li { margin-bottom: 3px; }
    .upgrade-body .plan-name {
      display: inline-block;
      padding: 1px 7px;
      margin: 0 2px;
      border-radius: 6px;
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.3px;
      vertical-align: middle;
    }
    .upgrade-body .plan-name.pro {
      background: rgba(180,140,255,0.22);
      color: rgba(220,200,255,0.98);
    }
    .upgrade-body .plan-name.max {
      background: linear-gradient(135deg, rgba(255,180,90,0.25), rgba(255,120,180,0.25));
      color: rgba(255,220,200,0.98);
    }
    .upgrade-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
    .upgrade-secondary, .upgrade-primary {
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      padding: 7px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.12s ease;
    }
    .upgrade-secondary {
      background: transparent;
      color: var(--text-tertiary);
      border: 1px solid var(--silver-border);
    }
    .upgrade-secondary:hover { color: var(--text-primary); border-color: var(--input-border); }
    .upgrade-primary {
      background: linear-gradient(135deg, rgba(180,140,255,0.22), rgba(255,120,180,0.20));
      color: rgba(255,255,255,0.98);
      border: 1px solid rgba(180,140,255,0.45);
      box-shadow: 0 2px 8px rgba(180,140,255,0.15);
    }
    .upgrade-primary:hover {
      background: linear-gradient(135deg, rgba(180,140,255,0.32), rgba(255,120,180,0.30));
      border-color: rgba(180,140,255,0.65);
    }

    /* ── Thinking dots ── */
    .thinking-dots {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 0;
    }
    .thinking-dots span {
      display: block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-tertiary);
      animation: dotPulse 1.2s ease-in-out infinite;
    }
    .thinking-dots span:nth-child(2) { animation-delay: 0.15s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes dotPulse {
      0%, 60%, 100% { opacity: 0.25; transform: scale(0.85); }
      30% { opacity: 1; transform: scale(1); }
    }

    /* ── Bottom area ── */
    #bottom-area {
      flex-shrink: 0;
      border-top: 0.5px solid var(--border);
      padding: 10px 14px 12px;
    }

    /* ── Quick actions ── */
    #quick-actions {
      display: flex;
      align-items: center;
      gap: 5px;
      padding-bottom: 10px;
      flex-wrap: wrap;
    }
    #template-buttons { display: contents; }

    .qbtn {
      padding: 5px 11px;
      border-radius: 50px;
      border: 0.5px solid var(--border-strong);
      background: var(--bg-hover);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .qbtn:hover {
      background: var(--bg-active);
      color: var(--text-primary);
      border-color: var(--primary-border);
    }
    .qbtn:active { transform: scale(0.97); }

    .qbtn.assist {
      background: var(--assist-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 0.5px solid var(--assist-border);
      color: var(--assist-color);
      font-weight: 600;
      padding: 6px 16px;
      box-shadow: 0 0 14px rgba(59,130,246,0.10), inset 0 0.5px 0 rgba(255,255,255,0.08);
      text-shadow: 0 0 10px rgba(59,130,246,0.15);
    }
    .qbtn.assist:hover {
      background: var(--assist-hover-bg);
      border-color: var(--assist-hover-border);
      color: var(--assist-color);
      box-shadow: 0 0 22px rgba(59,130,246,0.15), inset 0 0.5px 0 rgba(255,255,255,0.12);
    }

    .q-sep {
      color: var(--text-quaternary);
      font-size: 8px;
      margin: 0 1px;
    }

    /* ── Template selector ── */
    #template-selector {
      display: flex;
      align-items: center;
      gap: 4px;
      padding-bottom: 6px;
      position: relative;
    }
    #template-selector-btn {
      padding: 2px 8px; border-radius: 4px; border: none; background: transparent;
      color: var(--text-tertiary); font-family: inherit; font-size: 10px; font-weight: 500;
      cursor: pointer; transition: all 0.15s ease; display: flex; align-items: center; gap: 3px;
    }
    #template-selector-btn:hover { background: var(--bg-active); color: var(--text-secondary); }

    #template-dropdown {
      display: none;
      position: fixed;
      min-width: 140px;
      background: var(--dropdown-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-strong);
      border-radius: 10px;
      padding: 4px;
      z-index: 300;
      pointer-events: auto;
    }
    #template-dropdown.visible { display: block; }

    .tpl-option {
      display: flex; align-items: center; gap: 6px; padding: 6px 10px;
      border-radius: 5px; border: none; background: transparent;
      color: var(--text-secondary); font-family: inherit; font-size: 11px;
      cursor: pointer; width: 100%; text-align: left; transition: all 0.1s ease;
    }
    .tpl-option:hover { background: var(--bg-active); color: var(--text-primary); }
    .tpl-option.active { color: var(--text-primary); }
    .tpl-check { font-size: 10px; width: 14px; text-align: center; flex-shrink: 0; }

    /* ── Chat input ── */
    #chat-bar {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #chat-input-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      border-radius: 50px;
      border: 1px solid var(--silver-border);
      background: var(--input-bg);
      padding: 0 4px 0 16px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 0 0 0.5px var(--silver-glow);
    }
    #chat-input-wrap:focus-within {
      border-color: var(--primary-border);
      box-shadow: 0 0 0 2px var(--primary-soft), 0 0 8px rgba(59,130,246,0.08);
    }

    #chat-input {
      flex: 1; padding: 9px 0; border: none; background: transparent;
      color: var(--text-primary); font-family: inherit; font-size: 13px; outline: none;
    }
    #chat-input::placeholder { color: var(--text-quaternary); }

    .input-hint {
      display: flex; align-items: center; gap: 2px; margin-right: 6px; flex-shrink: 0;
    }
    .input-hint kbd {
      font-family: 'SF Mono', 'JetBrains Mono', monospace; font-size: 10px;
      padding: 2px 5px; border-radius: 4px; border: 1px solid var(--input-border);
      background: var(--bg-hover); color: var(--text-quaternary); line-height: 1;
    }

    /* Attach (paperclip) button — same footprint as send for alignment */
    #attach-btn {
      width: 30px; height: 30px;
      border-radius: 50%;
      border: 1px solid var(--silver-border);
      background: var(--input-bg);
      color: var(--text-tertiary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    #attach-btn:hover { color: var(--text-primary); border-color: rgba(59,130,246,0.35); }
    #attach-btn.locked {
      color: var(--text-quaternary);
      opacity: 0.55;
      cursor: not-allowed;
    }
    #attach-btn.locked:hover { color: var(--text-quaternary); border-color: var(--silver-border); }
    #attach-btn.locked::after {
      content: "MAX";
      position: absolute;
      bottom: -3px;
      right: -5px;
      font-size: 7.5px;
      font-weight: 700;
      background: linear-gradient(135deg, rgba(255,180,90,0.30), rgba(255,120,180,0.30));
      color: rgba(255,220,200,0.98);
      border-radius: 4px;
      padding: 1px 3px;
      pointer-events: none;
      letter-spacing: 0.3px;
    }
    #attach-btn { position: relative; }

    /* Floating control disabled (e.g. meeting button for non-Max) */
    .float-ctrl.tier-locked {
      opacity: 0.45;
      cursor: not-allowed;
      position: relative;
    }
    .float-ctrl.tier-locked::after {
      content: "MAX";
      position: absolute;
      bottom: -4px;
      right: -5px;
      font-size: 7px;
      font-weight: 700;
      background: linear-gradient(135deg, rgba(255,180,90,0.30), rgba(255,120,180,0.30));
      color: rgba(255,220,200,0.98);
      border-radius: 3px;
      padding: 1px 2.5px;
      pointer-events: none;
      letter-spacing: 0.2px;
    }
    .float-ctrl.tier-locked.pro-lock::after {
      content: "PRO";
      background: rgba(180,140,255,0.30);
      color: rgba(220,200,255,0.98);
    }

    /* Session doc chip row (above chat bar when docs attached) */
    #session-docs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 0 12px 8px 12px;
    }
    .sd-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      font-size: 11px;
      border-radius: 10px;
      background: rgba(59,130,246,0.10);
      border: 1px solid rgba(59,130,246,0.25);
      color: var(--text-secondary);
    }
    .sd-chip .sd-x {
      margin-left: 2px;
      cursor: pointer;
      color: var(--text-quaternary);
      font-size: 13px;
      line-height: 1;
    }
    .sd-chip .sd-x:hover { color: var(--danger); }

    /* Frosted send button */
    #send-btn {
      width: 34px; height: 34px;
      border-radius: 50%;
      border: 0.5px solid rgba(59,130,246,0.35);
      background: linear-gradient(135deg, rgba(59,130,246,0.85) 0%, rgba(37,99,235,0.95) 100%);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
      flex-shrink: 0;
      box-shadow: 0 0 16px rgba(59,130,246,0.20), inset 0 1px 0 rgba(255,255,255,0.15);
    }
    #send-btn:hover {
      background: linear-gradient(135deg, rgba(59,130,246,0.95) 0%, rgba(37,99,235,1) 100%);
      box-shadow: 0 0 24px rgba(59,130,246,0.30), inset 0 1px 0 rgba(255,255,255,0.20);
    }
    #send-btn:active { transform: scale(0.93); }

    /* Stop mode (square icon, red-ish) */
    #send-btn.stop-mode {
      background: linear-gradient(135deg, rgba(239,68,68,0.85) 0%, rgba(220,38,38,0.95) 100%);
      border-color: rgba(239,68,68,0.35);
      box-shadow: 0 0 16px rgba(239,68,68,0.20), inset 0 1px 0 rgba(255,255,255,0.15);
    }
    #send-btn.stop-mode:hover {
      background: linear-gradient(135deg, rgba(239,68,68,0.95) 0%, rgba(220,38,38,1) 100%);
      box-shadow: 0 0 24px rgba(239,68,68,0.30), inset 0 1px 0 rgba(255,255,255,0.20);
    }

    /* Disabled controls state */
    .controls-disabled .qbtn,
    .controls-disabled #btn-assist,
    .controls-disabled #template-selector-btn {
      opacity: 0.4;
      pointer-events: none;
    }
    .controls-disabled #chat-input {
      opacity: 0.5;
      pointer-events: none;
    }
    /* Send button stays clickable (it's the stop button) */
    .controls-disabled #send-btn {
      pointer-events: auto;
      opacity: 1;
    }

    /* ── Status footer (just hide hint) ── */
    #status-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 6px 0 0;
      font-size: 10px;
      color: var(--text-quaternary);
    }

    /* ── Invisible mode ── */
    #shell.invisible-mode {
      border: 1.5px dashed var(--primary-border);
    }

    /* Hidden element for header-status references */
    #header-status { display: none; }

    /* ══════════════════════════════════════════
       Meeting Copilot Styles
       ══════════════════════════════════════════ */

    /* Meeting views — hidden by default */
    #meeting-prep, #meeting-live, #meeting-summary, #meeting-history { display: none; }

    /* When shell has meeting-mode class, hide ALL chat elements completely */
    #shell.meeting-mode #chat-scroll {
      display: none !important;
      max-height: 0 !important;
      overflow: hidden !important;
      padding: 0 !important;
      margin: 0 !important;
      opacity: 0 !important;
    }
    #shell.meeting-mode #bottom-area {
      display: none !important;
      max-height: 0 !important;
      overflow: hidden !important;
      padding: 0 !important;
      margin: 0 !important;
    }
    #shell.meeting-mode #header-status { display: none !important; }

    /* Meeting views fill the shell */
    #shell.meeting-mode {
      overflow: hidden;
      max-height: calc(100% - 44px);
    }
    #shell.meeting-mode #meeting-prep {
      overflow-y: auto;
      flex: 1;
      min-height: 0;
    }
    #shell.meeting-mode #meeting-live {
      flex: 1;
      min-height: 0;
    }
    #shell.meeting-mode #meeting-summary {
      overflow-y: auto;
      flex: 1;
      min-height: 0;
    }
    #shell.meeting-mode #meeting-history {
      overflow-y: auto;
      flex: 1;
      min-height: 0;
    }

    /* Recording indicator in float-pill */
    #float-rec {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 0 8px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-primary);
    }
    #float-rec .rec-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #ef4444;
      animation: recPulse 1.5s ease-in-out infinite;
    }
    @keyframes recPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    #float-rec .rec-time {
      font-variant-numeric: tabular-nums;
      font-family: 'SF Mono', 'JetBrains Mono', monospace;
      font-size: 11px;
    }
    #float-stop-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      height: 22px;
      padding: 0 8px 0 6px;
      margin-left: 4px;
      border-radius: 999px;
      border: 0.5px solid rgba(239,68,68,0.35);
      background: rgba(239,68,68,0.10);
      color: rgba(239,120,120,0.95);
      font-family: inherit;
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.2px;
      cursor: pointer;
      transition: all 0.15s ease;
      -webkit-app-region: no-drag;
    }
    #float-stop-btn:hover {
      background: rgba(239,68,68,0.18);
      border-color: rgba(239,68,68,0.55);
      color: rgba(255,140,140,1);
    }
    #float-stop-btn svg { flex-shrink: 0; }
    .meeting-recording #float-rec { display: flex; }

    /* ── Meeting Prep Screen ── */
    #meeting-prep {
      padding: 16px;
      overflow-y: auto;
      max-height: 100%;
    }
    .mp-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .mp-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }
    .mp-history-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      height: 26px;
      padding: 0 10px 0 8px;
      border-radius: 999px;
      border: 0.5px solid var(--silver-border);
      background: var(--bg-hover);
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .mp-history-btn:hover {
      border-color: var(--primary-border);
      background: var(--primary-soft);
      color: var(--primary-text);
    }

    /* ── Meeting History Screen ── */
    #meeting-history { padding: 16px; }
    .mh-header-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .mh-back-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      height: 26px;
      padding: 0 10px 0 6px;
      border-radius: 999px;
      border: 0.5px solid var(--silver-border);
      background: var(--bg-hover);
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .mh-back-btn:hover {
      background: var(--bg-active);
      color: var(--text-primary);
    }
    .mh-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .mh-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .mh-item {
      padding: 10px 12px;
      border-radius: 10px;
      border: 0.5px solid var(--silver-border);
      background: var(--bg-hover);
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
    }
    .mh-item:hover {
      border-color: var(--primary-border);
      background: var(--primary-soft);
    }
    .mh-item-title {
      font-size: 12.5px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 3px;
      padding-right: 22px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .mh-item-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 10.5px;
      color: var(--text-tertiary);
      margin-bottom: 6px;
    }
    .mh-item-meta .mh-dot {
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: var(--text-quaternary);
    }
    .mh-item-preview {
      font-size: 11.5px;
      color: var(--text-secondary);
      line-height: 1.4;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .mh-item-delete {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--text-quaternary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      opacity: 0;
    }
    .mh-item:hover .mh-item-delete { opacity: 1; }
    .mh-item-delete:hover {
      background: var(--danger-soft);
      color: var(--danger);
    }
    .mh-empty {
      padding: 40px 20px;
      text-align: center;
      color: var(--text-tertiary);
    }
    .mh-empty-icon {
      display: inline-flex;
      color: var(--text-quaternary);
      margin-bottom: 10px;
    }
    .mh-empty-text {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    .mh-empty-sub {
      font-size: 11px;
      color: var(--text-tertiary);
    }

    /* Transcript section inside the summary screen */
    .ms-transcript-entry {
      margin-bottom: 5px;
      font-size: 11.5px;
      line-height: 1.4;
      color: var(--text-secondary);
    }
    .ms-transcript-entry .ms-t-speaker { font-weight: 600; margin-right: 4px; }
    .ms-transcript-entry.ms-t-you .ms-t-speaker { color: var(--primary-text); }
    .ms-transcript-entry.ms-t-them .ms-t-speaker { color: rgba(180,140,255,0.95); }
    .ms-transcript-entry .ms-t-text { color: var(--text-secondary); }
    .mp-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    .mp-context {
      width: 100%;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid var(--silver-border);
      background: var(--input-bg);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 12px;
      line-height: 1.5;
      resize: vertical;
      min-height: 60px;
      outline: none;
      transition: border-color 0.2s;
      box-shadow: 0 0 0 0.5px var(--silver-glow);
      margin-bottom: 16px;
    }
    .mp-context:focus {
      border-color: var(--primary-border);
      box-shadow: 0 0 0 2px var(--primary-soft);
    }
    .mp-context::placeholder { color: var(--text-quaternary); }

    /* Document upload area */
    .mp-docs {
      border: 1.5px dashed var(--border-strong);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 16px;
      min-height: 80px;
      transition: border-color 0.2s, background 0.2s;
    }
    .mp-docs.drag-over {
      border-color: var(--primary);
      background: var(--primary-soft);
    }
    .mp-doc-list { display: flex; flex-direction: column; gap: 6px; }
    .mp-doc-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 8px;
      background: var(--bg-hover);
      font-size: 12px;
      color: var(--text-primary);
    }
    .mp-doc-item .doc-icon {
      font-size: 14px;
      flex-shrink: 0;
      width: 20px;
      text-align: center;
    }
    .mp-doc-item .doc-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .mp-doc-item .doc-status {
      font-size: 10px;
      color: var(--success);
      flex-shrink: 0;
    }
    .mp-doc-item .doc-remove {
      background: none; border: none;
      color: var(--text-tertiary);
      cursor: pointer; font-size: 14px;
      padding: 0 2px;
      transition: color 0.15s;
    }
    .mp-doc-item .doc-remove:hover { color: var(--danger); }
    .mp-drop-hint {
      text-align: center;
      padding: 16px 8px;
      font-size: 11px;
      color: var(--text-tertiary);
      cursor: pointer;
    }
    .mp-drop-hint:hover { color: var(--text-secondary); }

    /* Start meeting button */
    .mp-start-btn {
      width: 100%;
      padding: 10px;
      border-radius: 50px;
      border: none;
      background: linear-gradient(135deg, rgba(239,68,68,0.85) 0%, rgba(220,38,38,0.95) 100%);
      color: #fff;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .mp-start-btn:hover {
      background: linear-gradient(135deg, rgba(239,68,68,0.95) 0%, rgba(220,38,38,1) 100%);
    }
    .mp-start-btn:active { transform: scale(0.98); }

    /* ── Meeting Live View ── */
    #meeting-live {
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    /* Transcript section */
    .ml-transcript {
      flex: 0 0 40%;
      overflow-y: auto;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      scroll-behavior: smooth;
    }
    .ml-transcript::-webkit-scrollbar { width: 3px; }
    .ml-transcript::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }
    .ml-t-label {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-quaternary);
      margin-bottom: 8px;
    }
    .ml-t-entry {
      margin-bottom: 6px;
      font-size: 12px;
      line-height: 1.45;
    }
    .ml-t-time {
      font-family: 'SF Mono', 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-quaternary);
      margin-right: 6px;
    }
    .ml-t-speaker {
      font-weight: 600;
      margin-right: 4px;
    }
    .ml-t-speaker.you { color: var(--primary-text); }
    .ml-t-speaker.other { color: var(--text-secondary); }
    .ml-t-text { color: var(--text-primary); }

    /* AI suggestions section */
    .ml-suggestions {
      flex: 1;
      overflow-y: auto;
      padding: 10px 14px;

  <script>
    // ── Theme system ──
    function applyThemeFromSettings() {
      window.electronAPI.invoke('settings:get').then(s => {
        if (!s) return;
        let theme = s.theme || 'dark';
        if (theme === 'system') {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', theme);
      });
    }
    applyThemeFromSettings();
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
      applyThemeFromSettings();
    });

    // ── Remove no-transition after first paint to enable animations ──
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        document.getElementById('shell').classList.remove('no-transition');
      });
    });

    // ── Click-through: transparent areas pass clicks to apps below ──
    // Electron setIgnoreMouseEvents(true, {forward:true}) makes the whole window
    // click-through but still receives mousemove. We re-enable clicks when the
    // cursor enters visible UI elements.
    const interactiveRoots = document.querySelectorAll('#float-row .float-pill, #float-rec, #shell, .ft-dropdown, #template-dropdown, #ss-modal, #upgrade-modal');
    interactiveRoots.forEach(el => {
      el.addEventListener('mouseenter', () => {
        window.electronAPI.send('panel:set-clickthrough', false);
      });
      el.addEventListener('mouseleave', () => {
        window.electronAPI.send('panel:set-clickthrough', true);
      });
    });

    // ── Markdown + LaTeX rendering ──
    if (typeof marked !== 'undefined') {
      marked.use({ breaks: true, gfm: true });
    }

    function extractLatex(text) {
      const placeholders = [];
      let idx = 0;
      text = text.replace(/\$\$([\s\S]+?)\$\$/g, (_, tex) => {
        const key = '\x00LATEX' + idx++ + '\x00';
        placeholders.push({ key, tex: tex.trim(), display: true });
        return key;
      });
      text = text.replace(/\\\[([\s\S]+?)\\\]/g, (_, tex) => {
        const key = '\x00LATEX' + idx++ + '\x00';
        placeholders.push({ key, tex: tex.trim(), display: true });
        return key;
      });
      text = text.replace(/(?<![\\$`])\$([^\$\n]+?)\$(?!`)/g, (_, tex) => {
        const key = '\x00LATEX' + idx++ + '\x00';
        placeholders.push({ key, tex: tex.trim(), display: false });
        return key;
      });
      text = text.replace(/\\\((.+?)\\\)/g, (_, tex) => {
        const key = '\x00LATEX' + idx++ + '\x00';
        placeholders.push({ key, tex: tex.trim(), display: false });
        return key;
      });
      return { text, placeholders };
    }

    function restoreLatex(html, placeholders) {
      if (typeof katex === 'undefined') {
        placeholders.forEach(p => {
          const delim = p.display ? '$$' : '$';
          html = html.replace(p.key, delim + p.tex + delim);
        });
        return html;
      }
      placeholders.forEach(p => {
        try {
          const rendered = p.display
            ? '<div class="katex-display">' + katex.renderToString(p.tex, { displayMode: true, throwOnError: false }) + '</div>'
            : katex.renderToString(p.tex, { displayMode: false, throwOnError: false });
          html = html.replace(p.key, rendered);
        } catch (e) {
          const delim = p.display ? '$$' : '$';
          html = html.replace(p.key, delim + p.tex + delim);
        }
      });
      return html;
    }

    function renderMarkdown(text) {
      const { text: safeText, placeholders } = extractLatex(text);
      let html;
      if (typeof marked !== 'undefined') {
        try { html = marked.parse(safeText); } catch (e) { html = null; }
      }
      if (!html) {
        html = escapeHtml(safeText).replace(/\n/g, '<br>');
      }
      html = restoreLatex(html, placeholders);
      return html;
    }

    // ── Code block copy buttons ──
    function enhanceCodeBlocks(container) {
      const pres = container.querySelectorAll('pre');
      pres.forEach((pre) => {
        if (pre.parentElement && pre.parentElement.classList.contains('code-block-wrap')) return;
        const code = pre.querySelector('code');
        const lang = code ? (code.className.match(/language-(\w+)/) || [])[1] || '' : '';
        const wrap = document.createElement('div');
        wrap.className = 'code-block-wrap';
        const header = document.createElement('div');
        header.className = 'code-block-header';
        header.innerHTML =
          '<span class="code-lang">' + (lang || 'code') + '</span>' +
          '<button class="copy-btn">Copy</button>';
        pre.parentNode.insertBefore(wrap, pre);
        wrap.appendChild(header);
        wrap.appendChild(pre);
        const btn = header.querySelector('.copy-btn');
        btn.addEventListener('click', () => {
          const text = code ? code.textContent : pre.textContent;
          navigator.clipboard.writeText(text).then(() => {
            btn.textContent = 'Copied';
            btn.classList.add('copied');
            setTimeout(() => {
              btn.textContent = 'Copy';
              btn.classList.remove('copied');
            }, 1500);
          });
        });
      });
    }

    // ── DOM refs ──
    const chatMessages = document.getElementById('chat-messages');
    const chatScroll = document.getElementById('chat-scroll');
    const chatInput = document.getElementById('chat-input');
    const ssModal = document.getElementById('ss-modal');
    const ssModalImg = document.getElementById('ss-modal-img');
    const shell = document.getElementById('shell');

    let currentAiMsg = null;
    let currentAiText = '';
    let renderPending = false;
    let lastScreenshotBase64 = null;

    // ── Screenshot modal — click backdrop (not image) to close ──
    ssModal.addEventListener('click', (e) => {
      if (e.target === ssModal) ssModal.classList.remove('visible');
    });

    function openScreenshot(base64) {
      ssModalImg.src = 'data:image/jpeg;base64,' + base64;
      ssModal.classList.add('visible');
    }

    // ── Smooth expand helper ──
    function expandPanel() {
      if (!shell.classList.contains('compact')) return;
      // Small delay so the send action registers first, then panel opens
      setTimeout(() => { shell.classList.remove('compact'); }, 80);
