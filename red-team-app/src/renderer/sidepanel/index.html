    // ── Add user message ──
    function addUserMessage(text, screenshotBase64) {
      const msg = document.createElement('div');
      msg.className = 'msg user';
      let html = '<div class="msg-body">' + escapeHtml(text) + '</div>';
      if (screenshotBase64) {
        html += '<div class="msg-meta" data-b64="' + screenshotBase64 + '">' +
          '<svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1.5" y="2.5" width="13" height="11" rx="1.5"/><circle cx="5.5" cy="6.5" r="1.5"/><path d="M1.5 11l3.5-3.5L8 10.5l2.5-2.5 4 4"/></svg>' +
          ' Sent with screenshot</div>';
      }
      msg.innerHTML = html;
      chatMessages.appendChild(msg);
      const meta = msg.querySelector('.msg-meta');
      if (meta) {
        meta.addEventListener('click', () => openScreenshot(meta.dataset.b64));
      }
      scrollToBottom();
    }

    // ── AI message lifecycle ──
    function startAiMessage() {
      const msg = document.createElement('div');
      msg.className = 'msg ai';
      msg.innerHTML = '<div class="msg-body"><div class="thinking-dots"><span></span><span></span><span></span></div></div>';
      chatMessages.appendChild(msg);
      currentAiMsg = msg.querySelector('.msg-body');
      currentAiText = '';
      renderPending = false;
      scrollToBottom();
    }

    function renderAiBody(final) {
      if (!currentAiMsg) return;
      const html = renderMarkdown(currentAiText);
      currentAiMsg.innerHTML = html;
      if (final) { enhanceCodeBlocks(currentAiMsg); }
      scrollToBottom();
    }

    function scrollToBottom() {
      chatScroll.scrollTop = chatScroll.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ── Screenshot arrives ──
    window.electronAPI.on('session:screenshot', (base64) => {
      lastScreenshotBase64 = base64;
      const userMsgs = chatMessages.querySelectorAll('.msg.user');
      const last = userMsgs[userMsgs.length - 1];
      if (last && !last.querySelector('.msg-meta')) {
        const meta = document.createElement('div');
        meta.className = 'msg-meta';
        meta.dataset.b64 = base64;
        meta.innerHTML = '<svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1.5" y="2.5" width="13" height="11" rx="1.5"/><circle cx="5.5" cy="6.5" r="1.5"/><path d="M1.5 11l3.5-3.5L8 10.5l2.5-2.5 4 4"/></svg> Sent with screenshot';
        last.appendChild(meta);
        meta.addEventListener('click', () => openScreenshot(base64));
      }
    });

    // ── Hotkey trigger ──
    window.electronAPI.on('session:trigger-message', (text) => {
      setTimeout(() => {
        expandPanel();
        addUserMessage(text, lastScreenshotBase64);
        startAiMessage();
      }, 50);
    });

    // ── Stream tokens (throttled markdown render) ──
    window.electronAPI.on('sidepanel:stream-token', (token) => {
      if (!currentAiMsg) { startAiMessage(); }
      currentAiText += token;
      if (!renderPending) {
        renderPending = true;
        requestAnimationFrame(() => {
          renderPending = false;
          renderAiBody(false);
        });
      }
    });

    window.electronAPI.on('ai:response-complete', () => {
      if (currentAiMsg) { renderAiBody(true); }
      currentAiMsg = null;
      currentAiText = '';
    });

    window.electronAPI.on('ai:error', (err) => {
      if (currentAiMsg) {
        currentAiMsg.innerHTML = '<p style="color:var(--danger);">Error: ' + escapeHtml(String(err)) + '</p>';
      }
      currentAiMsg = null;
      currentAiText = '';
    });

    // ── AI state management (disable controls + stop button) ──
    const sendBtn = document.getElementById('send-btn');
    const sendSvgArrow = '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="13" x2="8" y2="3"/><polyline points="4 7 8 3 12 7"/></svg>';
    const sendSvgStop = '<svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><rect x="3" y="3" width="10" height="10" rx="2"/></svg>';
    let aiState = 'idle'; // 'idle' | 'thinking' | 'streaming'

    function setAiState(state) {
      aiState = state;
      const bottomArea = document.getElementById('bottom-area');

      if (state === 'idle') {
        sendBtn.classList.remove('stop-mode');
        sendBtn.innerHTML = sendSvgArrow;
        if (bottomArea) bottomArea.classList.remove('controls-disabled');
      } else {
        // thinking or streaming — show stop button, disable controls
        sendBtn.classList.add('stop-mode');
        sendBtn.innerHTML = sendSvgStop;
        if (bottomArea) bottomArea.classList.add('controls-disabled');
      }
    }

    window.electronAPI.on('ai:state', (state) => {
      setAiState(state);
    });

    // ── Session cleared ──
    window.electronAPI.on('session:cleared', () => {
      // Instantly collapse — no transition so old content isn't visible
      shell.classList.add('no-transition');
      chatMessages.innerHTML = '';
      currentAiMsg = null;
      currentAiText = '';
      renderPending = false;
      lastScreenshotBase64 = null;
      setAiState('idle');
      shell.classList.add('compact');
      // Also reset meeting UI — if the panel was left in a meeting view
      // (prep / recording / summary) from a previous session, clearing only
      // chat would leave a stale meeting overlay on top of the new session.
      try {
        if (typeof setMeetingView === 'function') setMeetingView('idle');
        const meetingBtn = document.getElementById('sp-meeting-toggle');
        if (meetingBtn) meetingBtn.classList.remove('meeting-active');
      } catch {}
      // Drop any attached session-doc chips — they belong to the old session.
      try {
        if (typeof renderSessionDocs === 'function') renderSessionDocs([]);
      } catch {}
      // Re-enable transitions after instant collapse
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          shell.classList.remove('no-transition');
        });
      });
    });

    // ── Restore messages (continue session) ──
    window.electronAPI.on('session:restore-messages', (messages) => {
      shell.classList.remove('compact');
      chatMessages.innerHTML = '';
      currentAiMsg = null;
      currentAiText = '';
      renderPending = false;
      lastScreenshotBase64 = null;
      if (!messages || messages.length === 0) return;
      messages.forEach((m) => {
        if (m.role === 'user') {
          addUserMessage(m.content_text || '', m.screenshot || null);
        } else if (m.role === 'assistant') {
          const msg = document.createElement('div');
          msg.className = 'msg ai';
          msg.innerHTML = '<div class="msg-body">' + renderMarkdown(m.content_text || '') + '</div>';
          chatMessages.appendChild(msg);
          enhanceCodeBlocks(msg);
        }
      });
      scrollToBottom();
    });

    // ── End session ──
    document.getElementById('btn-end-session').addEventListener('click', () => {
      window.electronAPI.send('session:end');
    });

    // ── Custom drag ──
    const dragBtn = document.getElementById('btn-drag');
    let isDragging = false;
    dragBtn.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      isDragging = true;
      window.electronAPI.send('panel:start-drag', e.screenX, e.screenY);
      e.preventDefault();
    });
    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      window.electronAPI.send('panel:drag-move', e.screenX, e.screenY);
    });
    document.addEventListener('mouseup', () => { isDragging = false; });

    // ── Send message ──
    function sendMessage(text) {
      if (!text.trim() || aiState !== 'idle') return;
      expandPanel();
      addUserMessage(text, null);
      startAiMessage();
      window.electronAPI.send('sidepanel:chat-send', { type: 'message', text });
    }

    document.getElementById('send-btn').addEventListener('click', () => {
      if (aiState !== 'idle') {
        // Stop generating
        window.electronAPI.send('ai:stop');
        return;
      }
      sendMessage(chatInput.value);
      chatInput.value = '';
    });
    chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (aiState !== 'idle') return;
        sendMessage(chatInput.value);
        chatInput.value = '';
      }
    });

    // Focus management
    chatInput.addEventListener('mousedown', () => {
      window.electronAPI.send('panel:request-focus');
    });
    chatInput.addEventListener('blur', () => {
      window.electronAPI.send('panel:release-focus');
    });

    // ── Assist button ──
    document.getElementById('btn-assist').addEventListener('click', () => {
      window.electronAPI.send('session:trigger-assist');
    });

    // ── Template system ──
    let templates = [];
    let activeTemplateId = 'tpl-general';
    const templateBtnsContainer = document.getElementById('template-buttons');
    const templateNameLabel = document.getElementById('template-name');
    const templateDropdown = document.getElementById('template-dropdown');
    const templateSelectorBtn = document.getElementById('template-selector-btn');

    function renderTemplateButtons() {
      const template = templates.find(t => t.id === activeTemplateId);
      if (!template) return;
      templateNameLabel.textContent = template.name;
      templateBtnsContainer.innerHTML = '';

      template.buttons.forEach((btn, i) => {
        const el = document.createElement('button');
        el.className = 'qbtn';
        el.dataset.buttonId = btn.id;
        el.textContent = btn.label;
        el.addEventListener('click', () => {
          if (aiState !== 'idle') return;
          expandPanel();
          addUserMessage(btn.label, null);
          startAiMessage();
          window.electronAPI.send('sidepanel:chat-send', { type: 'action', action: btn.id });
        });
        templateBtnsContainer.appendChild(el);
      });
    }

    function renderTemplateDropdown() {
      templateDropdown.innerHTML = '';
      templates.forEach((tpl) => {
        const opt = document.createElement('button');
        opt.className = 'tpl-option' + (tpl.id === activeTemplateId ? ' active' : '');
        opt.innerHTML = '<span class="tpl-check">' + (tpl.id === activeTemplateId ? '\u2713' : '') + '</span>' + tpl.name;
        opt.addEventListener('click', () => {
          activeTemplateId = tpl.id;
          templateDropdown.classList.remove('visible');
          renderTemplateButtons();
          window.electronAPI.invoke('settings:update', { activeTemplateId: tpl.id });
        });
        templateDropdown.appendChild(opt);
      });
    }

    templateSelectorBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      renderTemplateDropdown();
      // Position dropdown using fixed coords, open downward from button
      const rect = templateSelectorBtn.getBoundingClientRect();
      templateDropdown.style.left = rect.left + 'px';
      templateDropdown.style.top = (rect.bottom + 4) + 'px';
      templateDropdown.style.bottom = 'auto';
      templateDropdown.classList.toggle('visible');
    });

    document.addEventListener('click', () => {
      templateDropdown.classList.remove('visible');
    });

    // Load templates on startup
    window.electronAPI.invoke('settings:get').then((s) => {
      if (s && s.promptTemplates) {
        templates = s.promptTemplates;
        activeTemplateId = s.activeTemplateId || 'tpl-general';
        renderTemplateButtons();
      }
    });

    // Update templates and theme when settings change
    window.electronAPI.on('settings:changed', (s) => {
      if (s && s.promptTemplates) {
        templates = s.promptTemplates;
        activeTemplateId = s.activeTemplateId || activeTemplateId;
        renderTemplateButtons();
      }
      if (s && s.theme) {
        let theme = s.theme;
        if (theme === 'system') {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', theme);
      }
      // Update invisibility state
      if (s) updateInvisibleMode(s);
    });

    // ── Dynamic hotkey hints ──
    const SYMBOL_MAP = {
      'CommandOrControl': '\u2318', 'Command': '\u2318', 'Control': '\u2303',
      'Ctrl': '\u2303', 'Shift': '\u21E7', 'Alt': '\u2325', 'Option': '\u2325', 'Space': '\u2423',
    };

    function renderHotkeyHint(accelerator, suffix) {
      if (!accelerator) return '';
      const parts = accelerator.split('+');
      let html = parts.map(p => '<kbd>' + (SYMBOL_MAP[p] || p) + '</kbd>').join('');
      if (suffix) html += ' ' + suffix;
      return html;
    }

    function hotkeyToSymbols(accelerator) {
      if (!accelerator) return '';
      return accelerator.split('+').map(p => SYMBOL_MAP[p] || p).join('');
    }

    function loadHotkeyHints() {
      window.electronAPI.invoke('settings:get').then((s) => {
        if (!s) return;
        const triggerHint = document.getElementById('trigger-hint');
        const hideHint = document.getElementById('hide-hint');
        if (triggerHint) triggerHint.innerHTML = renderHotkeyHint(s.hotkeys.trigger, '');
        if (hideHint) hideHint.innerHTML = renderHotkeyHint(s.hotkeys.emergencyHide, 'hide');
        const sym = hotkeyToSymbols(s.hotkeys.trigger);
        chatMessages.setAttribute('data-empty-hint',
          'Start a conversation, or press ' + sym + ' to analyze your screen.');
      });
    }
    loadHotkeyHints();

    window.electronAPI.on('settings:changed', (s) => {
      if (!s || !s.hotkeys) return;
      const triggerHint = document.getElementById('trigger-hint');
      const hideHint = document.getElementById('hide-hint');
      if (triggerHint) triggerHint.innerHTML = renderHotkeyHint(s.hotkeys.trigger, '');
      if (hideHint) hideHint.innerHTML = renderHotkeyHint(s.hotkeys.emergencyHide, 'hide');
      const sym = hotkeyToSymbols(s.hotkeys.trigger);
      chatMessages.setAttribute('data-empty-hint',
        'Start a conversation, or press ' + sym + ' to analyze your screen.');
    });

    // ── Timer (in floating bar) ──
    const spTimerTime = document.getElementById('sp-timer-time');
    const spTimerToggle = document.getElementById('sp-timer-toggle');
    const spTimerPlaypause = document.getElementById('sp-timer-playpause');
    const spTimerStop = document.getElementById('sp-timer-stop');
    const spTimerDropdown = document.getElementById('sp-timer-dropdown');
    let spTimerStatus = 'idle';
    let spSelectedMinutes = 25;

    const ftActiveGroup = document.getElementById('ft-active-group');
    const floatTimer = document.getElementById('float-timer');

    function updateSpTimer(state) {
      spTimerStatus = state.status;
      if (state.status === 'idle') {
        floatTimer.classList.remove('timer-active');
        ftActiveGroup.classList.remove('show');
        spTimerDropdown.classList.remove('open');
      } else {
        floatTimer.classList.add('timer-active');
        ftActiveGroup.classList.add('show');
        spTimerDropdown.classList.remove('open');

        const m = Math.floor(state.remainingSeconds / 60);
        const s = state.remainingSeconds % 60;
        spTimerTime.textContent = m + ':' + String(s).padStart(2, '0');

        if (state.status === 'focus') {
          spTimerTime.className = 'ft-time focus';
          spTimerPlaypause.innerHTML = '<svg width="9" height="9" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="3" x2="5" y2="13"/><line x1="11" y1="3" x2="11" y2="13"/></svg>';
          spTimerPlaypause.title = 'Pause';
        } else if (state.status === 'break') {
          spTimerTime.className = 'ft-time break';
          spTimerPlaypause.innerHTML = '<svg width="9" height="9" viewBox="0 0 16 16" fill="currentColor"><polygon points="3,2 13,8 3,14"/></svg>';
          spTimerPlaypause.title = 'Skip break';
        } else if (state.status === 'paused') {
          spTimerTime.className = 'ft-time paused';
          spTimerPlaypause.innerHTML = '<svg width="9" height="9" viewBox="0 0 16 16" fill="currentColor"><polygon points="3,2 13,8 3,14"/></svg>';
          spTimerPlaypause.title = 'Resume';
        }
      }
    }

    spTimerToggle.addEventListener('click', (e) => {
      e.stopPropagation();
      spTimerDropdown.classList.toggle('open');
    });

    document.addEventListener('click', (e) => {
      if (!document.getElementById('float-timer').contains(e.target)) {
        spTimerDropdown.classList.remove('open');
      }
    });

    document.querySelectorAll('.ft-preset').forEach(btn => {
      btn.addEventListener('click', () => {
        spSelectedMinutes = parseInt(btn.dataset.minutes, 10);
        document.querySelectorAll('.ft-preset').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });

    document.getElementById('sp-timer-start').addEventListener('click', () => {
      window.electronAPI.send('timer:start', spSelectedMinutes);
      spTimerDropdown.classList.remove('open');
    });

    spTimerPlaypause.addEventListener('click', (e) => {
      e.stopPropagation();
      if (spTimerStatus === 'focus') window.electronAPI.send('timer:pause');
      else if (spTimerStatus === 'paused') window.electronAPI.send('timer:resume');
      else if (spTimerStatus === 'break') window.electronAPI.send('timer:skip-break');
    });

    spTimerStop.addEventListener('click', (e) => {
      e.stopPropagation();
      window.electronAPI.send('timer:end');
    });

    window.electronAPI.on('timer:tick', (state) => { updateSpTimer(state); });

    window.electronAPI.invoke('timer:get-state').then((state) => {
      if (state) updateSpTimer(state);
    }).catch(() => {});

    // ── Invisibility mode ──
    let currentInvisible = false;

    const invisToggleBtn = document.getElementById('sp-invis-toggle');

    function updateInvisibleMode(settings) {
      currentInvisible = !!settings.contentProtection;
      if (currentInvisible) {
        shell.classList.add('invisible-mode');
        invisToggleBtn.classList.add('invis-active');
        invisToggleBtn.title = 'Invisible mode ON';
      } else {
        shell.classList.remove('invisible-mode');
        invisToggleBtn.classList.remove('invis-active');
        invisToggleBtn.title = 'Invisible mode OFF';
      }
    }

    window.electronAPI.invoke('settings:get').then(s => {
      if (s) updateInvisibleMode(s);
    });

    invisToggleBtn.addEventListener('click', () => {
      // Pro + Max only
      if (currentTier !== 'pro' && currentTier !== 'max') {
        showUpgradeModal({ feature: 'invisible', currentTier: currentTier });
        return;
      }
      const newVal = !currentInvisible;
      // settings:toggle-content-protection also calls setContentProtection()
      // on both windows at the OS level. settings:update alone only writes
      // to the store — which is why the toggle button wasn't actually
      // affecting visibility before.
      window.electronAPI.send('settings:toggle-content-protection', newVal);
      updateInvisibleMode({ contentProtection: newVal });
    });

    // ── Upgrade modal (tier-gated features + daily-quota hits) ──
    const upgradeModal = document.getElementById('upgrade-modal');
    const upgradeTitleEl = document.getElementById('upgrade-title');
    const upgradeBodyEl = document.getElementById('upgrade-body');
    const upgradeCtaBtn = document.getElementById('upgrade-cta');
    const upgradeLaterBtn = document.getElementById('upgrade-later');
    const upgradeCloseBtn = document.getElementById('upgrade-close');

    function planBadge(name) {
      return '<span class="plan-name ' + name + '">' + name.toUpperCase() + '</span>';
    }

    function showUpgradeModal(opts) {
      const feature = opts?.feature || 'generic';
      const tier = opts?.currentTier || 'free';

      let title = 'Upgrade to unlock';
      let body = '';
      let targetPlan = 'max'; // default

      if (feature === 'meeting') {
        title = 'Meeting Copilot is a Max feature';
        body =
          'Meeting Copilot — real-time transcription, live AI suggestions, and meeting summaries — is available on the ' +
          planBadge('max') + ' plan.';
        targetPlan = 'max';
      } else if (feature === 'attach') {
        title = 'Attach documents with Max';
        body =
          'Attaching files to your chat session is a ' + planBadge('max') + ' feature. ' +
          'Upload PDFs, notes, and docs so Hinty can reason over them.';
        targetPlan = 'max';
      } else if (feature === 'invisible') {
        title = 'Invisible Mode needs Pro';
        body =
          'Invisible Mode — hides Hinty from screen captures and recordings — is included with ' +
          planBadge('pro') + ' and ' + planBadge('max') + '.';
        targetPlan = 'pro';
      } else if (feature === 'quota') {
        title = 'Daily limit reached';
        if (tier === 'free') {
          body =
            'You\'ve used all 20 messages for today on the Free plan. ' +
            'Upgrade to ' + planBadge('pro') + ' for unlimited daily messages, or ' + planBadge('max') +
            ' for everything including Meeting Copilot and document attachments.';
          targetPlan = 'pro';
        } else {
          body =
            'You\'ve hit today\'s request limit. It resets at midnight UTC. ' +
            'Upgrade to ' + planBadge('max') + ' for the highest limits.';
          targetPlan = 'max';
        }
      } else {
        body = 'This feature requires a higher plan.';
      }

      upgradeTitleEl.textContent = title;
      upgradeBodyEl.innerHTML = body;
      upgradeCtaBtn.textContent = targetPlan === 'pro' ? 'Upgrade to Pro' : 'Upgrade to Max';
      upgradeCtaBtn.dataset.plan = targetPlan;
      upgradeModal.classList.add('visible');

      // Quota-hit UX cleanup: if the user just sent a message that bounced
      // off a daily limit, the panel has already expanded (user bubble +
      // empty response area). Collapse it so the modal isn't floating over
      // a half-filled chat pane. Also drop any thinking/streaming state and
      // remove the last unanswered user bubble so the chat log doesn't show
      // an orphan message.
      if (feature === 'quota') {
        try {
          if (typeof setAiState === 'function') setAiState('idle');
        } catch {}
        try {
          const lastUserMsg = chatMessages && chatMessages.querySelector('.msg.user:last-child');
          if (lastUserMsg) lastUserMsg.remove();
        } catch {}
        shell.classList.add('compact');
      }

      // Make sure the panel isn't in click-through mode — the modal's
      // mouseenter handler will already do this, but if the mouse wasn't
      // over the modal area when it opened, buttons would appear dead.
      try { window.electronAPI.send('panel:set-clickthrough', false); } catch {}
    }

    function hideUpgradeModal() {
      upgradeModal.classList.remove('visible');
      // The modal was added to interactiveRoots so its mouseleave toggles
      // click-through back on — but if the modal hid before mouseleave
      // fired (e.g. user pressed Later), we force transparency back on so
      // the panel doesn't trap clicks over empty space.
      try { window.electronAPI.send('panel:set-clickthrough', true); } catch {}
    }

    upgradeCloseBtn.addEventListener('click', hideUpgradeModal);
    upgradeLaterBtn.addEventListener('click', hideUpgradeModal);
    upgradeModal.addEventListener('click', (e) => {
      if (e.target === upgradeModal) hideUpgradeModal();
    });
    upgradeCtaBtn.addEventListener('click', () => {
      window.electronAPI.send('stripe:upgrade');
      hideUpgradeModal();
    });

    // Server-signalled daily quota hit → friendly modal instead of red toast.
    window.electronAPI.on('tier:quota-exceeded', (payload) => {
      showUpgradeModal({ feature: 'quota', currentTier: payload?.currentTier });
    });

    // Main-process blocked a gated action (e.g. meeting:start-prep).
    window.electronAPI.on('tier:gate-blocked', (payload) => {
      showUpgradeModal({ feature: payload?.feature || 'generic', currentTier: payload?.currentTier });
    });

    // ── Tier state (shared by attach + meeting + invisibility gates) ──
    const attachBtn = document.getElementById('attach-btn');
    const sessionDocsEl = document.getElementById('session-docs');
    let currentTier = null;

    function applyTierGates() {
      // Attach button — Max only
      const isMax = currentTier === 'max';
      if (isMax) {
        attachBtn.classList.remove('locked');
        attachBtn.title = 'Attach documents to this session';
      } else {
        attachBtn.classList.add('locked');
        attachBtn.title = currentTier === 'pro'
          ? 'Attachments are available on the Max plan'
          : currentTier === 'free'
          ? 'Attachments are available on the Max plan'
          : 'Sign in to use attachments';
      }

      // Meeting button — Max only
      const meetingBtn = document.getElementById('sp-meeting-toggle');
      if (meetingBtn) {
        if (isMax) {
          meetingBtn.classList.remove('tier-locked');
          meetingBtn.title = 'Meeting Copilot';
        } else {
          meetingBtn.classList.add('tier-locked');
          meetingBtn.title = 'Meeting Copilot is available on the Max plan';
        }
      }

      // Invisibility — Pro + Max. Free users: greyed out, forced off.
      const invisBtn = document.getElementById('sp-invis-toggle');
      if (invisBtn) {
        const hasInvis = currentTier === 'pro' || currentTier === 'max';
        if (hasInvis) {
          invisBtn.classList.remove('tier-locked', 'pro-lock');
          // title is managed by updateInvisibleMode
        } else {
          invisBtn.classList.add('tier-locked', 'pro-lock');
          invisBtn.title = 'Invisible Mode is available on Pro and Max plans';
          // Force off if user somehow had it on
          if (currentInvisible) {
            window.electronAPI.invoke('settings:update', { contentProtection: false });
            updateInvisibleMode({ contentProtection: false });
          }
        }
      }
    }

    async function refreshTier() {
      try {
        const auth = await window.electronAPI.invoke('auth:status');
        currentTier = auth?.user?.tier || null;
      } catch {
        currentTier = null;
      }
      applyTierGates();
    }
    // Defer one tick so `currentInvisible` (declared earlier) and DOM are ready.
    setTimeout(refreshTier, 0);

    // Tier may change at runtime (login, profile refresh, subscription webhook).
    window.electronAPI.on('auth:state-changed', () => { refreshTier(); });

    function renderSessionDocs(docs) {
      sessionDocsEl.innerHTML = '';
      if (!docs || docs.length === 0) {
        sessionDocsEl.style.display = 'none';
        return;
      }
      sessionDocsEl.style.display = 'flex';
      docs.forEach(d => {
        const chip = document.createElement('div');
        chip.className = 'sd-chip';
        chip.innerHTML = '<span>📎</span><span>' + escapeHtml(d.fileName) + '</span>' +
                         '<span class="sd-x" data-id="' + escapeHtml(d.id) + '">×</span>';
        chip.querySelector('.sd-x').addEventListener('click', async () => {
          window.electronAPI.send('session:remove-document', d.id);
          await refreshSessionDocs();
        });
        sessionDocsEl.appendChild(chip);
      });
    }

    async function refreshSessionDocs() {
      try {
        const docs = await window.electronAPI.invoke('session:list-documents');
        renderSessionDocs(docs);
      } catch {
        renderSessionDocs([]);
      }
    }

    attachBtn.addEventListener('click', async () => {
      // Hard-disable for non-Max users — surface the upgrade modal instead
      // of firing an IPC that will just fail.
      if (currentTier !== 'max') {
        showUpgradeModal({
          feature: 'attach',
          currentTier: currentTier,
        });
        return;
      }
      const result = await window.electronAPI.invoke('session:upload-document');
      if (!result || !result.ok) {
        if (result?.reason === 'upgrade-required') {
          showUpgradeModal({ feature: 'attach', currentTier: result?.currentTier });
        } else if (result?.reason === 'signin-required') {
          showUpgradeModal({ feature: 'attach', currentTier: null });
        } else if (result?.reason === 'no-session') {
          // Silent: the session is auto-started on first message anyway.
        }
        return;
      }
      await refreshSessionDocs();
    });

    // ── Meeting toggle button ──
    const meetingToggleBtn = document.getElementById('sp-meeting-toggle');

    meetingToggleBtn.addEventListener('click', () => {
      if (meetingState === 'idle') {
        // Meeting Copilot is Max-tier only.
        if (currentTier !== 'max') {
          showUpgradeModal({ feature: 'meeting', currentTier: currentTier });
          return;
        }
        // Enter meeting prep mode
        window.electronAPI.send('meeting:start-prep');
        setMeetingView('prep');
        meetingToggleBtn.classList.add('meeting-active');
      } else {
        // If in prep, close meeting. If recording/ended, ignore (use stop/close buttons).
        if (meetingState === 'prep') {
          window.electronAPI.send('meeting:end');
          setMeetingView('idle');
          meetingToggleBtn.classList.remove('meeting-active');
        }
        // If recording, don't toggle — user must use stop button
        // If ended (summary), don't toggle — user must use close button
      }
    });

    // ══════════════════════════════════════════
    //  Meeting Copilot UI
    // ══════════════════════════════════════════

    const meetingPrep = document.getElementById('meeting-prep');
    const meetingLive = document.getElementById('meeting-live');
    const meetingSummary = document.getElementById('meeting-summary');
    const mpContext = document.getElementById('mp-context');
    const mpDocs = document.getElementById('mp-docs');
    const mpDocList = document.getElementById('mp-doc-list');
    const mpDropHint = document.getElementById('mp-drop-hint');
    const mpStartBtn = document.getElementById('mp-start-btn');
    const mlTranscriptEntries = document.getElementById('ml-transcript-entries');
    const mlSuggestionCards = document.getElementById('ml-suggestion-cards');
    const mlActionList = document.getElementById('ml-action-list');
    const mlActions = document.getElementById('ml-actions');
    const recTimeEl = document.getElementById('rec-time');
    const meetingChatInput = document.getElementById('meeting-chat-input');
    const meetingSendBtn = document.getElementById('meeting-send-btn');

    let meetingState = 'idle';
    let meetingDocs = []; // { id, fileName, fileType, chars }
    let recTimerInterval = null;
    let recStartTime = 0;
    let mlAutoScroll = true;

    // ── Meeting mode switching ──

    function setMeetingView(viewState) {
      meetingState = viewState;
      const s = shell;
      const meetingBtn = document.getElementById('sp-meeting-toggle');

      // Hide all meeting views first
      meetingPrep.style.display = 'none';
      meetingLive.style.display = 'none';
      meetingSummary.style.display = 'none';

      if (viewState === 'idle') {
        s.classList.remove('meeting-mode', 'meeting-recording');
        document.getElementById('outer-wrap').classList.remove('meeting-recording');
        meetingBtn.classList.remove('meeting-active');
        stopRecTimer();
        return;
      }

      // Enter meeting mode — expand shell, hide chat
      s.classList.add('meeting-mode');
      s.classList.remove('compact');
      meetingBtn.classList.add('meeting-active');

      if (viewState === 'prep') {
        meetingPrep.style.display = 'block';
        s.classList.remove('meeting-recording');
        document.getElementById('outer-wrap').classList.remove('meeting-recording');
      } else if (viewState === 'recording') {
        meetingLive.style.display = 'flex';
        s.classList.add('meeting-recording');
        document.getElementById('outer-wrap').classList.add('meeting-recording');
        startRecTimer();
      } else if (viewState === 'ended') {
        meetingSummary.style.display = 'block';
        s.classList.remove('meeting-recording');
        document.getElementById('outer-wrap').classList.remove('meeting-recording');
        stopRecTimer();
      }
    }

    // ── Recording timer ──

    function startRecTimer() {
      recStartTime = Date.now();
      stopRecTimer();
      recTimerInterval = setInterval(() => {
        const elapsed = Math.floor((Date.now() - recStartTime) / 1000);
        const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
        const s = String(elapsed % 60).padStart(2, '0');
        recTimeEl.textContent = m + ':' + s;
      }, 1000);
    }

    function stopRecTimer() {
      if (recTimerInterval) {
        clearInterval(recTimerInterval);
        recTimerInterval = null;
      }
    }

    // ── Meeting Prep: Document upload ──

    function renderDocList() {
      mpDocList.innerHTML = '';
      mpDropHint.style.display = meetingDocs.length === 0 ? 'block' : 'none';

      meetingDocs.forEach(doc => {
        const iconMap = { pdf: '📄', docx: '📝', xlsx: '📊', txt: '📋', md: '📋' };
        const item = document.createElement('div');
        item.className = 'mp-doc-item';
        item.innerHTML =
          '<span class="doc-icon">' + (iconMap[doc.fileType] || '📄') + '</span>' +
          '<span class="doc-name">' + escapeHtml(doc.fileName) + '</span>' +
          '<span class="doc-status">✓</span>' +
          '<button class="doc-remove" data-id="' + doc.id + '">&times;</button>';
        item.querySelector('.doc-remove').addEventListener('click', () => {
          window.electronAPI.send('meeting:remove-doc', doc.id);
          meetingDocs = meetingDocs.filter(d => d.id !== doc.id);
          renderDocList();
        });
        mpDocList.appendChild(item);
      });
    }

    mpDropHint.addEventListener('click', async () => {
      const docs = await window.electronAPI.invoke('meeting:upload-doc');
      if (docs && docs.length > 0) {
        meetingDocs.push(...docs);
        renderDocList();
      }
    });

    // Drag & drop on the doc area
    mpDocs.addEventListener('dragover', (e) => {
      e.preventDefault();
      mpDocs.classList.add('drag-over');
    });
    mpDocs.addEventListener('dragleave', () => {
      mpDocs.classList.remove('drag-over');
    });
    mpDocs.addEventListener('drop', async (e) => {
      e.preventDefault();
      mpDocs.classList.remove('drag-over');
      // Drag-drop file upload handled via IPC (native file picker for now)
      const docs = await window.electronAPI.invoke('meeting:upload-doc');
      if (docs && docs.length > 0) {
        meetingDocs.push(...docs);
        renderDocList();
      }
    });

    // ── Meeting Prep: Start ──

    mpStartBtn.addEventListener('click', () => {
      const ctx = mpContext.value.trim();
      if (ctx) {
        window.electronAPI.send('meeting:set-context', ctx);
      }
      window.electronAPI.send('meeting:start-recording');
    });

    // ── Meeting Live: Transcript ──

    function addTranscriptEntry(entry) {
      const div = document.createElement('div');
      div.className = 'ml-t-entry';

      const mins = Math.floor(entry.timestamp / 60);
      const secs = entry.timestamp % 60;
      const time = String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');

      const speakerLabel = entry.speaker === 'you' ? 'You' : 'Them';
      const speakerClass = entry.speaker === 'you' ? 'you' : 'other';

      div.innerHTML =
        '<span class="ml-t-time">' + time + '</span>' +
        '<span class="ml-t-speaker ' + speakerClass + '">' + escapeHtml(speakerLabel) + ':</span> ' +
        '<span class="ml-t-text">' + escapeHtml(entry.text) + '</span>';

      mlTranscriptEntries.appendChild(div);

      // Auto-scroll transcript
      if (mlAutoScroll) {
        const container = document.getElementById('ml-transcript');
        container.scrollTop = container.scrollHeight;
      }
    }

    // Pause auto-scroll when user scrolls up
    document.getElementById('ml-transcript')?.addEventListener('scroll', function() {
      const el = this;
      mlAutoScroll = (el.scrollHeight - el.scrollTop - el.clientHeight) < 40;
    });

    // ── Meeting Live: Suggestions ──

    function addSuggestion(suggestion) {
      const card = document.createElement('div');
      card.className = 'ml-suggestion-card' + (suggestion.type === 'warning' ? ' warning' : '');

      const typeLabel = suggestion.type === 'warning' ? 'Warning' :
        suggestion.type === 'action_item' ? 'Action Item' : 'Suggestion';

      card.innerHTML =
        '<div class="sug-type">' + typeLabel + '</div>' +
        '<div>' + escapeHtml(suggestion.content) + '</div>';

      // Keep only last 5 suggestions visible
      while (mlSuggestionCards.children.length >= 5) {
        mlSuggestionCards.removeChild(mlSuggestionCards.firstChild);
      }

      mlSuggestionCards.appendChild(card);
      document.getElementById('ml-suggestions').scrollTop = document.getElementById('ml-suggestions').scrollHeight;
    }

    // ── Meeting Live: Action Items ──

    function addActionItem(item) {
      mlActions.style.display = 'block';

      const div = document.createElement('div');
      div.className = 'ml-action-item';
      div.innerHTML =
        '<button class="a-check" data-id="' + item.id + '">✓</button>' +
        '<span>' + escapeHtml(item.task) +
        (item.owner ? ' <span class="a-owner">— ' + escapeHtml(item.owner) + '</span>' : '') +
        '</span>';

      div.querySelector('.a-check').addEventListener('click', function() {
        this.classList.toggle('done');
      });

      mlActionList.appendChild(div);
    }

    // ── Meeting Live: Chat (user messages) ──

    meetingSendBtn.addEventListener('click', () => {
      const text = meetingChatInput.value.trim();
      if (!text || aiState !== 'idle') return;
      meetingChatInput.value = '';
      window.electronAPI.send('meeting:chat-send', { text, withScreenshot: false });
    });

    meetingChatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        meetingSendBtn.click();
      }
    });

    // Meeting template buttons
    document.querySelectorAll('.mt-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (aiState !== 'idle') return;
        const action = btn.dataset.action;
        const prompts = {
          'summary': 'Summarize the meeting so far — key points, what was discussed, and any decisions made.',
          'actions': 'List all action items mentioned so far, with who is responsible for each one.',
          'key-points': 'What are the most important points discussed so far?',
        };
        const text = prompts[action] || action;
        window.electronAPI.send('meeting:chat-send', { text, withScreenshot: false });
      });
    });

    // Stop recording (compact button in float-rec indicator)
    document.getElementById('float-stop-btn').addEventListener('click', () => {
      window.electronAPI.send('meeting:stop');
    });

    // ── Meeting Summary ──

    function renderSummary(summary, duration) {
      const mins = Math.floor(duration / 60);
      document.getElementById('ms-duration').textContent = mins + ' minute' + (mins !== 1 ? 's' : '');

      if (!summary) {
        document.getElementById('ms-overview').textContent = 'No summary generated.';
        document.getElementById('ms-decisions').innerHTML = '';
        document.getElementById('ms-action-items').innerHTML = '';
        document.getElementById('ms-followups').innerHTML = '';
        return;
      }

      document.getElementById('ms-overview').textContent = summary.overview || '';

      const decisionsEl = document.getElementById('ms-decisions');
      decisionsEl.innerHTML = (summary.keyDecisions || []).length > 0
        ? '<ul>' + summary.keyDecisions.map(d => '<li>' + escapeHtml(d) + '</li>').join('') + '</ul>'
        : '<p style="color:var(--text-tertiary)">None</p>';

      const actionsEl = document.getElementById('ms-action-items');
      actionsEl.innerHTML = (summary.actionItems || []).length > 0
        ? '<ul>' + summary.actionItems.map(a =>
            '<li>' + escapeHtml(a.task) + (a.owner ? ' — <em>' + escapeHtml(a.owner) + '</em>' : '') + '</li>'
          ).join('') + '</ul>'
        : '<p style="color:var(--text-tertiary)">None</p>';

      const followupsEl = document.getElementById('ms-followups');
      followupsEl.innerHTML = (summary.followUps || []).length > 0
        ? '<ul>' + summary.followUps.map(f => '<li>' + escapeHtml(f) + '</li>').join('') + '</ul>'
        : '<p style="color:var(--text-tertiary)">None</p>';
    }

    // Section collapse toggle
    document.querySelectorAll('.ms-section-title').forEach(title => {
      title.addEventListener('click', () => {
        title.classList.toggle('collapsed');
        const body = title.nextElementSibling;
        body.style.display = title.classList.contains('collapsed') ? 'none' : 'block';
      });
    });

    // Copy summary
    document.getElementById('ms-copy-btn').addEventListener('click', () => {
      const text = document.getElementById('meeting-summary').innerText;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('ms-copy-btn');
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
      });
    });

    // Close summary → end meeting
    document.getElementById('ms-close-btn').addEventListener('click', () => {
      window.electronAPI.send('meeting:end');
      setMeetingView('idle');
      // Clear meeting state
      meetingDocs = [];
      mpContext.value = '';
      renderDocList();
      mlTranscriptEntries.innerHTML = '';
      mlSuggestionCards.innerHTML = '';
      mlActionList.innerHTML = '';
      mlActions.style.display = 'none';
      document.getElementById('sp-meeting-toggle').classList.remove('meeting-active');
    });

    // Meeting history has been consolidated into the general window's
    // unified history. No side-panel history UI here anymore.

    // ── Meeting IPC listeners ──

    window.electronAPI.on('meeting:state', (newState) => {
      setMeetingView(newState);
    });

    window.electronAPI.on('meeting:transcript-update', (entry) => {
      addTranscriptEntry(entry);
    });

    window.electronAPI.on('meeting:suggestion', (suggestion) => {
      addSuggestion(suggestion);
    });

    window.electronAPI.on('meeting:action-item', (item) => {
      addActionItem(item);
    });

    let summaryDuration = 0;
    window.electronAPI.on('meeting:summary', (summary) => {
      const elapsed = recStartTime ? Math.floor((Date.now() - recStartTime) / 1000) : 0;
      renderSummary(summary, elapsed);
    });

    window.electronAPI.on('meeting:error', (err) => {
      console.error('[meeting-ui] Error:', err);
      // Show error as a suggestion card with warning style
      addSuggestion({ type: 'warning', content: 'Error: ' + err, id: 'err_' + Date.now() });
    });

    // ── Enter meeting prep (called externally, e.g. from general window) ──
    window.electronAPI.on('meeting:enter-prep', () => {
      window.electronAPI.send('meeting:start-prep');
      setMeetingView('prep');
    });
  </script>
</body>
</html>
